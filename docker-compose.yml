services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: local-finance-dashboard:prod
    container_name: local-finance-dashboard
    init: true
    ports:
      - "${APP_PORT:-3003}:3003"
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/dev.db
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3003}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-nextauth-secret}
      BACKEND_URL: ${BACKEND_URL:-http://127.0.0.1:4000/api}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3003}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-change-me-internal-api-secret}
      PORT: 4000
    volumes:
      - ./data:/data
      - ./public/uploads:/app/public/uploads
    restart: unless-stopped
